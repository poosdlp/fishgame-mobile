name: Flutter CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feature/**'
      - 'dev/**'
  workflow_dispatch:

jobs:
  ci:
    name: Analyze and Unit/Widget Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Test
        run: flutter test

  integration_test:
    name: Android Integration Tests
    runs-on: macos-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            flutter test integration_test/real_auth_flow_test.dart \
              --dart-define=TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
              --dart-define=TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

  build_branch_apk:
    name: Build Branch APK
    runs-on: ubuntu-latest
    needs: [ci, integration_test]
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-debug.apk

  distribute_main:
    name: Distribute Main APK
    runs-on: ubuntu-latest
    needs: [ci, integration_test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Write service account JSON
        shell: bash
        run: |
          cat > firebase-service-account.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "${{ secrets.FIREBASE_TESTER_GROUPS }}" \
            --release-notes "Build from ${{ github.sha }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-main-release
          path: build/app/outputs/flutter-apk/app-release.apk